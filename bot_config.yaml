# Bot Configuration File
# WebSocket Server Settings
server:
  host: "localhost"
  port: 8080
  protocol: "ws"  # ws or wss
  sid: ""  # Bot unique identifier (UUID)
  jwt_token: ""  # JWT token for authentication

# Group chat list to monitor (QQ group IDs)
group_list:
  - 640265417
  - 1032389222

# QQ verification timeout (in minutes)
verify_timeout: 3

# Allowed rating IDs for automatic approval
allowed_rating_ids: []

# Group IDs allowed to process join requests (empty = allow all)
allowed_join_groups: []

# Welcome message settings for new group members
welcome_message:
  enabled: false  # Enable/disable welcome message feature
  template: "欢迎新成员！试卷ID：{paper_id}，生成时间：{generate_time}，提交时间：{submit_time}，得分：{score}，答题次数：{answer_count}，耗时：{duration}"

# Auto-invalidate exam records when user leaves group
leave_group_invalidate:
  enabled: false
